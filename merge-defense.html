<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge Defense</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 14px 8px;
      user-select: none;
    }

    h1 {
      font-size: 1.75rem;
      letter-spacing: 4px;
      color: #e94560;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* HUD */
    #hud { display: flex; gap: 16px; margin-bottom: 10px; }

    .hud-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 7px 16px;
      text-align: center;
      min-width: 108px;
    }
    .hud-label {
      font-size: 0.65rem;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    #hp-val, #wave-val, #score-val { font-size: 1rem; font-weight: bold; }

    #hp-bar-wrap {
      background: #0f3460;
      border-radius: 4px;
      height: 7px;
      width: 100%;
      margin-bottom: 3px;
      overflow: hidden;
    }
    #hp-bar {
      height: 100%;
      border-radius: 4px;
      background: #57c264;
      transition: width 0.4s, background 0.4s;
    }

    #status {
      font-size: 0.82rem;
      color: #a8dadc;
      margin-bottom: 8px;
      min-height: 18px;
      text-align: center;
      max-width: 530px;
    }

    /* Game area */
    #game-area { display: flex; flex-direction: column; align-items: center; }

    #enemy-zone {
      display: grid;
      grid-template-columns: repeat(7, 66px);
      grid-template-rows: repeat(7, 66px);
      gap: 5px;
      padding: 5px;
      background: rgba(15, 52, 96, 0.22);
      border-radius: 8px 8px 0 0;
    }

    #gap-zone {
      display: flex;
      gap: 5px;
      padding: 3px 5px;
      background: rgba(233, 69, 96, 0.06);
      border-top: 2px solid rgba(233, 69, 96, 0.35);
      border-bottom: 2px solid rgba(168, 218, 220, 0.35);
    }
    .gap-cell {
      width: 66px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      border-radius: 3px;
    }

    #player-zone {
      display: grid;
      grid-template-columns: repeat(7, 66px);
      grid-template-rows: repeat(2, 66px);
      gap: 5px;
      padding: 5px;
      background: rgba(168, 218, 220, 0.05);
      border-radius: 0 0 8px 8px;
    }

    /* Base cell */
    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
      cursor: default;
      gap: 1px;
      overflow: hidden;
    }

    .player-cell { border-color: rgba(168, 218, 220, 0.22); }
    .player-cell:hover { background: #1c2a50; }

    /* Character */
    .char-cell { cursor: grab; }
    .char-cell:active { cursor: grabbing; }
    .char-cell.dragging { opacity: 0.35; }
    .drag-over { background: #122040 !important; border-color: #a8dadc !important; }

    .char-emoji { font-size: 1.45rem; line-height: 1; margin-top: 2px; }
    .char-badge {
      font-size: 0.56rem;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(0,0,0,0.45);
    }
    .char-dmg { font-size: 0.48rem; color: #666; }

    .char-lv1 { border-color: #a8dadc; }
    .char-lv2 { border-color: #4fc3f7; }
    .char-lv3 { border-color: #ffd54f; }
    .char-lv4 { border-color: #ff8a65; }
    .char-lv5 { border-color: #ef5350; }
    .char-lv6 { border-color: #ce93d8; box-shadow: 0 0 8px rgba(206,147,216,0.5); }

    /* Enemy */
    .enemy-t1 { border-color: #e94560; }
    .enemy-t2 { border-color: #ff6f00; }
    .enemy-t3 { border-color: #b71c1c; box-shadow: 0 0 6px rgba(183,28,28,0.5); }

    .enemy-emoji { font-size: 1.45rem; line-height: 1; margin-top: 2px; }
    .enemy-hp-wrap {
      width: 76%;
      height: 4px;
      background: #0f3460;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }
    .enemy-hp-bar { height: 100%; background: #e94560; border-radius: 2px; transition: width 0.3s; }
    .enemy-stats { font-size: 0.46rem; color: #666; }

    /* Controls */
    #controls { display: flex; gap: 12px; margin-top: 12px; }
    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.92rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 1px;
    }
    button:hover:not(:disabled) { background: #c73652; transform: scale(1.03); }
    button:disabled { background: #333; cursor: not-allowed; }
    #restart-btn { background: #0f3460; }
    #restart-btn:hover:not(:disabled) { background: #163a6e; transform: scale(1.03); }

    #hint {
      font-size: 0.72rem;
      color: #555;
      margin-top: 8px;
      text-align: center;
    }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
    }
    #overlay.hidden { display: none; }
    #overlay-title {
      font-size: 2.8rem;
      font-weight: bold;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    #overlay-sub { font-size: 1.05rem; color: #a8dadc; }

    /* Animations */
    @keyframes merge-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.42); }
      65%  { transform: scale(0.87); }
      100% { transform: scale(1); }
    }
    .merge-pop { animation: merge-pop 0.42s cubic-bezier(.36,.07,.19,.97) forwards; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }
    .pulse { animation: pulse 0.5s ease-in-out; }

    @keyframes enemy-advance {
      0%   { transform: translateY(-14px); opacity: 0.4; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .enemy-advance { animation: enemy-advance 0.35s ease-out forwards; }

    @keyframes cell-flash {
      0%   { background: #8b1a2a; }
      30%  { background: #e94560; }
      100% { background: #16213e; }
    }
    #player-zone.attack-flash .cell { animation: cell-flash 0.65s ease-out forwards; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%  { transform: translateX(-7px); }
      40%  { transform: translateX(7px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
    }
    .shake { animation: shake 0.38s ease-in-out; }

    @keyframes proj-fly {
      0%   { transform: translateY(0) scale(1.2); opacity: 1; }
      100% { transform: translateY(-26px) scale(0.3); opacity: 0; }
    }
    .proj-fly { animation: proj-fly 0.28s ease-out forwards; }

    /* Orb overlay */
    #orb-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 110;
    }
    #orb-overlay.hidden { display: none; }

    #orb-title {
      font-size: 1.6rem;
      font-weight: bold;
      color: #a8dadc;
    }

    #orb-subtitle {
      font-size: 0.9rem;
      color: #888;
      min-height: 18px;
    }

    #orb-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .orb-card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: 130px;
      padding: 16px;
      background: #16213e;
      border: 2px solid #a8dadc;
      border-radius: 12px;
      cursor: pointer;
      gap: 6px;
      transition: transform 0.15s, border-color 0.15s;
    }
    .orb-card.orb-unit { border-color: #a8dadc; }
    .orb-card.orb-chest { border-color: #ffd54f; }
    .orb-card:hover { transform: scale(1.06); }
    .orb-card.orb-unit:hover { border-color: #d0f0f2; }
    .orb-card.orb-chest:hover { border-color: #ffe57f; }

    .orb-card .orb-emoji { font-size: 2.2rem; }
    .orb-card .orb-label { font-size: 0.85rem; font-weight: bold; text-align: center; }
    .orb-card .orb-desc  { font-size: 0.7rem; color: #888; text-align: center; }

    /* Chest overlay */
    #chest-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 120;
    }
    #chest-overlay.hidden { display: none; }

    #chest-title {
      font-size: 1.6rem;
      font-weight: bold;
      color: #ffd54f;
    }

    #chest-subtitle {
      font-size: 0.9rem;
      color: #888;
    }

    #chest-cards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .chest-card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: 180px;
      padding: 16px;
      background: #16213e;
      border: 2px solid #ffd54f;
      border-radius: 12px;
      cursor: pointer;
      gap: 6px;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .chest-card:hover { transform: scale(1.06); box-shadow: 0 0 12px rgba(255,213,79,0.3); }

    .chest-card .chest-emoji { font-size: 2.2rem; }
    .chest-card .chest-label { font-size: 0.85rem; font-weight: bold; text-align: center; }
    .chest-card .chest-desc  { font-size: 0.7rem; color: #888; text-align: center; }
  </style>
</head>
<body>

<h1>Merge Defense</h1>

<div id="hud">
  <div class="hud-box" id="hp-box">
    <div class="hud-label">HP</div>
    <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
    <div id="hp-val">100 / 100</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Wave</div>
    <div id="wave-val">1 / 10</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Killed</div>
    <div id="score-val">0</div>
  </div>
</div>

<div id="status">Drag to position or merge fighters. Click End Turn when ready.</div>

<div id="game-area">
  <div id="enemy-zone"></div>
  <div id="gap-zone"></div>
  <div id="player-zone"></div>
</div>

<div id="controls">
  <button id="end-turn-btn">⚔ End Turn</button>
  <button id="restart-btn">↺ New Game</button>
</div>
<div id="hint">Drag same-level fighters onto each other to merge them · Fighters auto-attack by column each turn</div>

<div id="overlay" class="hidden">
  <div id="overlay-title"></div>
  <div id="overlay-sub"></div>
  <button id="overlay-btn">Play Again</button>
</div>

<div id="orb-overlay" class="overlay-screen hidden">
  <div id="orb-title">Wave Cleared! Choose Rewards</div>
  <div id="orb-subtitle"></div>
  <div id="orb-cards"></div>
</div>

<div id="chest-overlay" class="overlay-screen hidden">
  <div id="chest-title">Open the Chest</div>
  <div id="chest-subtitle">Choose one reward</div>
  <div id="chest-cards"></div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const COLS = 7, ENEMY_ROWS = 7, PLAYER_ROWS = 2, MAX_WAVE = 10, MAX_LEVEL = 6;
  const ATTACK_ROW = ENEMY_ROWS - 1; // row 6: enemies here deal damage then are removed

  const LEVEL_CONFIG = [
    { emoji: '⚔️',  damage: 10  },
    { emoji: '🗡️',  damage: 25  },
    { emoji: '🔥',  damage: 60  },
    { emoji: '⚡',  damage: 140 },
    { emoji: '💥',  damage: 320 },
    { emoji: '🌟',  damage: 700 },
  ];

  const ENEMY_EMOJIS = ['💀', '👻', '👹']; // tier 1 / 2 / 3

  // ── State ──────────────────────────────────────────────────────────────────
  let playerHP, playerMaxHP, wave, score, gameOver, turnPhase;
  let enemies, enemyIdCounter, playerChars, charIdCounter, dragSource;
  let pendingOrbs = [];
  let orbsPhase = false;
  let upgrades = { statBoost: false, icePending: 0 };
  let gridBuilt = false;

  // ── Utilities ─────────────────────────────────────────────────────────────
  const getCell = (r, c) => document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
  const delay   = ms => new Promise(res => setTimeout(res, ms));

  function shuffleArr(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── Grid build ────────────────────────────────────────────────────────────
  function buildGrid() {
    const ez = document.getElementById('enemy-zone');
    const gz = document.getElementById('gap-zone');
    const pz = document.getElementById('player-zone');

    for (let r = 0; r < ENEMY_ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement('div');
        el.className = 'cell';
        el.dataset.row = r;
        el.dataset.col = c;
        ez.appendChild(el);
      }
    }

    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'gap-cell';
      el.dataset.col = c;
      gz.appendChild(el);
    }

    for (let r = ENEMY_ROWS; r < ENEMY_ROWS + PLAYER_ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement('div');
        el.className = 'cell player-cell';
        el.dataset.row = r;
        el.dataset.col = c;
        el.ondragover  = e => handleDragOver(e, r, c);
        el.ondragleave = e => handleDragLeave(e, r, c);
        el.ondrop      = e => handleDrop(e, r, c);
        pz.appendChild(el);
      }
    }
  }

  function clearGrid() {
    for (let r = 0; r < ENEMY_ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = getCell(r, c);
        if (el) { el.innerHTML = ''; el.className = 'cell'; }
      }
    }
    document.querySelectorAll('.gap-cell').forEach(el => { el.innerHTML = ''; el.className = 'gap-cell'; });
    for (let r = ENEMY_ROWS; r < ENEMY_ROWS + PLAYER_ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = getCell(r, c);
        if (el) {
          el.innerHTML = '';
          el.className = 'cell player-cell';
          el.removeAttribute('draggable');
          el.ondragstart = null;
        }
      }
    }
  }

  // ── Entity creators ───────────────────────────────────────────────────────
  const addEnemy = (row, col, hp, dmg, wNum) =>
    enemies.push({ id: enemyIdCounter++, row, col, hp, maxHp: hp, damage: dmg, wave: wNum });

  const addPlayerChar = (row, col, level) =>
    playerChars.push({ id: charIdCounter++, row, col, level });

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    playerHP = playerMaxHP = 100;
    wave = 1; score = 0; gameOver = false; turnPhase = 'player';
    enemies = []; enemyIdCounter = 0;
    playerChars = []; charIdCounter = 0;
    dragSource = null;
    pendingOrbs = [];
    orbsPhase = false;
    upgrades = { statBoost: false, icePending: 0 };
    document.getElementById('orb-overlay').classList.add('hidden');
    document.getElementById('chest-overlay').classList.add('hidden');

    if (!gridBuilt) { buildGrid(); gridBuilt = true; } else clearGrid();

    addPlayerChar(8, 2, 1);
    addPlayerChar(8, 4, 1);

    spawnWave(1);
    renderAll();
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('status').textContent = 'Drag to position or merge fighters. Click End Turn when ready.';
    document.getElementById('end-turn-btn').disabled = false;
  }

  // ── Wave spawning ─────────────────────────────────────────────────────────
  function spawnWave(wNum) {
    const count  = 3 + (wNum - 1) * 2;
    const hp     = Math.round(30 * Math.pow(1.5, wNum - 1));
    const damage = Math.round(5  * Math.pow(1.2, wNum - 1));

    const positions = [];
    for (let r = 0; r < Math.min(4, ENEMY_ROWS); r++)
      for (let c = 0; c < COLS; c++)
        positions.push({ row: r, col: c });
    shuffleArr(positions);

    for (let i = 0; i < Math.min(count, positions.length); i++)
      addEnemy(positions[i].row, positions[i].col, hp, damage, wNum);
  }

  // ── Rendering ─────────────────────────────────────────────────────────────
  function renderAll() { renderEnemyZone(); renderPlayerZone(); updateHUD(); }

  function renderEnemyZone() {
    for (let r = 0; r < ENEMY_ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = getCell(r, c);
        if (el) { el.innerHTML = ''; el.className = 'cell'; }
      }
    }
    for (const e of enemies) {
      const el = getCell(e.row, e.col);
      if (!el) continue;
      const tier = e.wave <= 3 ? 1 : e.wave <= 6 ? 2 : 3;
      const pct  = Math.max(0, Math.round(e.hp / e.maxHp * 100));
      el.innerHTML =
        `<div class="enemy-emoji">${ENEMY_EMOJIS[tier - 1]}</div>` +
        `<div class="enemy-hp-wrap"><div class="enemy-hp-bar" style="width:${pct}%"></div></div>` +
        `<div class="enemy-stats">${e.hp}/${e.maxHp}</div>`;
      el.className = `cell enemy-cell enemy-t${tier}`;
    }
  }

  function renderPlayerZone() {
    for (let r = ENEMY_ROWS; r < ENEMY_ROWS + PLAYER_ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = getCell(r, c);
        if (el) {
          el.innerHTML = '';
          el.className = 'cell player-cell';
          el.removeAttribute('draggable');
          el.ondragstart = null;
        }
      }
    }
    for (const ch of playerChars) {
      const el = getCell(ch.row, ch.col);
      if (!el) continue;
      const cfg = LEVEL_CONFIG[ch.level - 1];
      el.innerHTML =
        `<div class="char-emoji">${cfg.emoji}</div>` +
        `<div class="char-badge">L${ch.level}</div>` +
        `<div class="char-dmg">${cfg.damage}⚡</div>`;
      el.className = `cell player-cell char-cell char-lv${ch.level}`;
      el.setAttribute('draggable', 'true');
      el.ondragstart = e => handleDragStart(e, ch.id);
    }
  }

  function updateHUD() {
    document.getElementById('hp-val').textContent = `${Math.max(0, playerHP)} / ${playerMaxHP}`;
    const pct = Math.max(0, playerHP / playerMaxHP * 100);
    const bar = document.getElementById('hp-bar');
    bar.style.width = pct + '%';
    bar.style.background = pct > 60 ? '#57c264' : pct > 30 ? '#ffd54f' : '#e94560';
    document.getElementById('wave-val').textContent = `${wave} / ${MAX_WAVE}`;
    document.getElementById('score-val').textContent = score;
  }

  // ── Combat ────────────────────────────────────────────────────────────────
  function playerAttackStep() {
    for (let col = 0; col < COLS; col++) {
      const charsHere = playerChars.filter(c => c.col === col);
      if (!charsHere.length) continue;

      const dmg = charsHere.reduce((s, c) => s + LEVEL_CONFIG[c.level - 1].damage, 0);

      // Frontmost enemy in same column, else nearest in adjacent columns
      let target = enemies.filter(e => e.col === col).sort((a, b) => b.row - a.row)[0];
      if (!target) {
        for (let d = 1; d < COLS && !target; d++) {
          const candidates = enemies
            .filter(e => e.col === col - d || e.col === col + d)
            .sort((a, b) => b.row - a.row);
          target = candidates[0];
        }
      }

      if (target) {
        target.hp -= dmg;
        const gapEl = document.querySelector(`.gap-cell[data-col="${col}"]`);
        if (gapEl) {
          gapEl.textContent = '⚡';
          gapEl.classList.add('proj-fly');
          setTimeout(() => { gapEl.textContent = ''; gapEl.classList.remove('proj-fly'); }, 300);
        }
      }
    }
  }

  function advanceEnemies() {
    enemies.sort((a, b) => b.row - a.row); // front enemies move first
    const occupied = new Set();
    const movedIds = [];

    for (const e of enemies) {
      if (e.row >= ATTACK_ROW) {
        occupied.add(`${e.row},${e.col}`);
        continue;
      }
      const nr = e.row + 1;
      if (!occupied.has(`${nr},${e.col}`)) {
        e.row = nr;
        occupied.add(`${nr},${e.col}`);
        movedIds.push(e.id);
      } else {
        let moved = false;
        for (const dc of [-1, 1, -2, 2]) {
          const nc = e.col + dc;
          if (nc < 0 || nc >= COLS) continue;
          if (!occupied.has(`${nr},${nc}`)) {
            e.col = nc; e.row = nr;
            occupied.add(`${nr},${nc}`);
            movedIds.push(e.id);
            moved = true;
            break;
          }
        }
        if (!moved) occupied.add(`${e.row},${e.col}`);
      }
    }
    return movedIds;
  }

  function enemyAttackStep() {
    const attackers = enemies.filter(e => e.row === ATTACK_ROW);
    const dmg = attackers.reduce((s, e) => s + e.damage, 0);
    if (dmg > 0) {
      playerHP = Math.max(0, playerHP - dmg);
      enemies = enemies.filter(e => e.row !== ATTACK_ROW);
    }
    return dmg;
  }

  // ── Turn resolution ───────────────────────────────────────────────────────
  function handleEndTurn() {
    if (gameOver || turnPhase !== 'player') return;
    turnPhase = 'resolving';
    document.getElementById('end-turn-btn').disabled = true;
    document.querySelectorAll('[draggable="true"]').forEach(el => el.removeAttribute('draggable'));
    resolveTurn();
  }

  async function resolveTurn() {
    document.getElementById('status').textContent = '⚔️ Fighters attacking…';
    playerAttackStep();
    renderEnemyZone();

    await delay(400);

    // Remove dead enemies
    const killed = enemies.filter(e => e.hp <= 0).length;
    score += killed;
    enemies = enemies.filter(e => e.hp > 0);
    renderEnemyZone();
    updateHUD();

    await delay(250);

    // Wave cleared?
    if (enemies.length === 0) {
      if (wave === MAX_WAVE) { triggerVictory(); return; }

      document.getElementById('status').textContent = `✨ Wave ${wave} cleared! Choose your rewards!`;
      playerChars.forEach(ch => {
        const el = getCell(ch.row, ch.col);
        if (el) { el.classList.add('pulse'); setTimeout(() => el.classList.remove('pulse'), 550); }
      });

      await delay(900);
      wave++;
      await showOrbRewards();
      document.getElementById('orb-overlay').classList.add('hidden');
      spawnWave(wave);
      renderAll();
      document.getElementById('status').textContent = `Wave ${wave} / ${MAX_WAVE} — Position fighters, then End Turn.`;
      turnPhase = 'player';
      document.getElementById('end-turn-btn').disabled = false;
      return;
    }

    // Advance enemies
    document.getElementById('status').textContent = '💀 Enemies advancing…';
    const movedIds = advanceEnemies();
    renderEnemyZone();
    movedIds.forEach(id => {
      const e = enemies.find(x => x.id === id);
      if (!e) return;
      const el = getCell(e.row, e.col);
      if (el) { el.classList.add('enemy-advance'); setTimeout(() => el.classList.remove('enemy-advance'), 380); }
    });

    await delay(500);

    // Enemy attack
    const dmg = enemyAttackStep();
    renderEnemyZone();
    updateHUD();

    if (dmg > 0) {
      document.getElementById('status').textContent = `💔 Enemies struck! −${dmg} HP!`;
      const pz = document.getElementById('player-zone');
      pz.classList.add('attack-flash');
      setTimeout(() => pz.classList.remove('attack-flash'), 700);
      const hpBox = document.getElementById('hp-box');
      hpBox.classList.add('shake');
      setTimeout(() => hpBox.classList.remove('shake'), 400);
    }

    await delay(700);

    if (playerHP <= 0) { triggerGameOver(); return; }

    turnPhase = 'player';
    document.getElementById('end-turn-btn').disabled = false;
    renderPlayerZone(); // re-enables draggable on chars
    document.getElementById('status').textContent = `Wave ${wave} / ${MAX_WAVE} — Position or merge fighters, then End Turn.`;
  }

  // ── Wave reward ───────────────────────────────────────────────────────────
  function grantMergeReward() {
    // replaced by orb system
  }

  function grantUnitOrb() {
    const all = [];
    for (let r = ENEMY_ROWS; r < ENEMY_ROWS + PLAYER_ROWS; r++)
      for (let c = 0; c < COLS; c++)
        all.push({ row: r, col: c });
    const empty = all.filter(p => !playerChars.some(ch => ch.row === p.row && ch.col === p.col));
    if (!empty.length) return;
    const pick = empty[Math.floor(Math.random() * empty.length)];
    addPlayerChar(pick.row, pick.col, 1);
  }

  const CHEST_OPTIONS = [
    { id: 'stat_boost',   emoji: '⚡', label: 'Power Surge',      desc: 'All fighters deal +25% damage',          type: 'upgrade', borderColor: '#ffd54f' },
    { id: 'enemy_weaken', emoji: '💀', label: 'Weaken Foes',      desc: 'All enemies lose 20% HP now',            type: 'upgrade', borderColor: '#ffd54f' },
    { id: 'ice_slow',     emoji: '❄️', label: 'Glacial Trap',     desc: 'Next turn: 2 enemies are frozen',        type: 'upgrade', borderColor: '#4fc3f7' },
    { id: 'heal',         emoji: '💚', label: 'Field Medic',      desc: 'Restore 20 HP',                          type: 'upgrade', borderColor: '#57c264' },
    { id: 'fire',         emoji: '🔥', label: 'Fire Strike',      desc: 'A fighter gains Fire — burns on hit',    type: 'ability', borderColor: '#e94560' },
    { id: 'lightning',    emoji: '⚡', label: 'Chain Lightning',  desc: 'A fighter gains Lightning — chains hit', type: 'ability', borderColor: '#4fc3f7' },
    { id: 'plants',       emoji: '🌿', label: 'Thornshot',        desc: 'A fighter gains Plants — pierces behind',type: 'ability', borderColor: '#57c264' },
  ];

  function applyChestOption(opt) {
    if (opt.id === 'stat_boost') {
      upgrades.statBoost = true;
    } else if (opt.id === 'enemy_weaken') {
      for (const e of enemies) e.hp = Math.max(1, Math.floor(e.hp * 0.8));
      renderEnemyZone();
    } else if (opt.id === 'ice_slow') {
      upgrades.icePending = 2;
    } else if (opt.id === 'heal') {
      playerHP = Math.min(playerMaxHP, playerHP + 20);
      updateHUD();
    } else if (opt.id === 'fire' || opt.id === 'lightning' || opt.id === 'plants') {
      if (!playerChars.length) return;
      const maxLv = Math.max(...playerChars.map(c => c.level));
      const candidates = playerChars.filter(c => c.level === maxLv);
      const ch = candidates[Math.floor(Math.random() * candidates.length)];
      ch.ability = opt.id;
    }
  }

  function openChest() {
    return new Promise(resolve => {
      const pool = shuffleArr([...CHEST_OPTIONS]).slice(0, 3);
      const overlay = document.getElementById('chest-overlay');
      const cardsEl = document.getElementById('chest-cards');
      cardsEl.innerHTML = '';

      for (const opt of pool) {
        const card = document.createElement('div');
        card.className = 'chest-card';
        card.style.borderColor = opt.borderColor;
        card.innerHTML =
          `<div class="chest-emoji">${opt.emoji}</div>` +
          `<div class="chest-label">${opt.label}</div>` +
          `<div class="chest-desc">${opt.desc}</div>`;
        card.addEventListener('click', () => {
          applyChestOption(opt);
          overlay.classList.add('hidden');
          resolve();
        });
        cardsEl.appendChild(card);
      }

      overlay.classList.remove('hidden');
    });
  }

  function showOrbRewards() {
    const orbs = [
      { id: 0, type: 'unit' },
      { id: 1, type: 'chest' },
    ];
    if (wave >= 5) orbs.push({ id: 2, type: 'unit' });

    const overlay  = document.getElementById('orb-overlay');
    const cardsEl  = document.getElementById('orb-cards');
    const subtitle = document.getElementById('orb-subtitle');

    function renderOrbCards(remaining) {
      cardsEl.innerHTML = '';
      subtitle.textContent = remaining.length > 1
        ? `${remaining.length} rewards remaining — claim them one by one`
        : '1 reward remaining';
      for (const orb of remaining) {
        const card = document.createElement('div');
        card.className = `orb-card orb-${orb.type}`;
        if (orb.type === 'unit') {
          card.innerHTML =
            `<div class="orb-emoji">⚔️</div>` +
            `<div class="orb-label">New Fighter</div>` +
            `<div class="orb-desc">Adds a level-1 fighter to a random empty cell</div>`;
        } else {
          card.innerHTML =
            `<div class="orb-emoji">📦</div>` +
            `<div class="orb-label">Mystery Chest</div>` +
            `<div class="orb-desc">Choose a power-up or ability upgrade</div>`;
        }
        card.dataset.orbId = orb.id;
        cardsEl.appendChild(card);
      }
    }

    return new Promise(resolve => {
      let remaining = [...orbs];
      overlay.classList.remove('hidden');
      renderOrbCards(remaining);

      async function claimNext() {
        if (!remaining.length) { resolve(); return; }

        await new Promise(res => {
          const handler = async e => {
            const card = e.target.closest('.orb-card');
            if (!card) return;
            const id = parseInt(card.dataset.orbId, 10);
            const orbIdx = remaining.findIndex(o => o.id === id);
            if (orbIdx === -1) return;

            const orb = remaining[orbIdx];
            remaining.splice(orbIdx, 1);
            cardsEl.removeEventListener('click', handler);

            if (orb.type === 'unit') {
              grantUnitOrb();
              renderPlayerZone();
              res();
            } else {
              // open chest overlay (above orb overlay)
              await openChest();
              res();
            }
          };
          cardsEl.addEventListener('click', handler);
        });

        if (remaining.length) {
          renderOrbCards(remaining);
          await claimNext();
        } else {
          resolve();
        }
      }

      claimNext();
    });
  }

  // ── Drag & drop ───────────────────────────────────────────────────────────
  function handleDragStart(e, charId) {
    if (turnPhase !== 'player' || gameOver) { e.preventDefault(); return; }
    dragSource = { id: charId };
    const ch = playerChars.find(c => c.id === charId);
    if (ch) { const el = getCell(ch.row, ch.col); if (el) el.classList.add('dragging'); }
    e.dataTransfer.effectAllowed = 'move';
  }

  function handleDragOver(e, row, col) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const el = getCell(row, col);
    if (el) el.classList.add('drag-over');
  }

  function handleDragLeave(e, row, col) {
    const el = getCell(row, col);
    if (el) el.classList.remove('drag-over');
  }

  function handleDrop(e, targetRow, targetCol) {
    e.preventDefault();
    const targetEl = getCell(targetRow, targetCol);
    if (targetEl) targetEl.classList.remove('drag-over');
    if (!dragSource || turnPhase !== 'player' || gameOver) { dragSource = null; return; }

    const src = playerChars.find(c => c.id === dragSource.id);
    if (!src) { dragSource = null; return; }

    const dst = playerChars.find(c => c.row === targetRow && c.col === targetCol);

    if (!dst) {
      // Move to empty cell
      src.row = targetRow;
      src.col = targetCol;
      dragSource = null;
      renderPlayerZone();
    } else if (dst.id !== src.id && dst.level === src.level) {
      // Merge — same level
      const newLv = Math.min(src.level + 1, MAX_LEVEL);
      playerChars = playerChars.filter(c => c.id !== src.id && c.id !== dst.id);
      addPlayerChar(targetRow, targetCol, newLv);
      dragSource = null;
      renderPlayerZone();
      const el = getCell(targetRow, targetCol);
      if (el) { el.classList.add('merge-pop'); setTimeout(() => el.classList.remove('merge-pop'), 450); }
    } else {
      // Different level — no-op
      dragSource = null;
      renderPlayerZone();
    }
  }

  function handleDragEnd() {
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragSource = null;
  }

  // ── End conditions ────────────────────────────────────────────────────────
  function triggerGameOver() {
    gameOver = true;
    document.getElementById('overlay-title').style.color = '#e94560';
    document.getElementById('overlay-title').textContent = 'GAME OVER';
    document.getElementById('overlay-sub').textContent = `Wave ${wave} / ${MAX_WAVE} — ${score} enemies defeated`;
    document.getElementById('overlay-btn').textContent = 'Play Again';
    document.getElementById('overlay').classList.remove('hidden');
  }

  function triggerVictory() {
    gameOver = true;
    document.getElementById('overlay-title').style.color = '#a8dadc';
    document.getElementById('overlay-title').textContent = 'YOU WIN! 🌟';
    document.getElementById('overlay-sub').textContent = `All 10 waves survived — ${score} enemies defeated`;
    document.getElementById('overlay-btn').textContent = 'Play Again';
    document.getElementById('overlay').classList.remove('hidden');
  }

  // ── Event wiring ──────────────────────────────────────────────────────────
  document.getElementById('end-turn-btn').addEventListener('click', handleEndTurn);
  document.getElementById('restart-btn').addEventListener('click', init);
  document.getElementById('overlay-btn').addEventListener('click', init);
  document.addEventListener('dragend', handleDragEnd);

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  init();
</script>
